server:
  port: 8087

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/**

        - id: crop-service
          uri: lb://crop-service
          predicates:
            - Path=/crop/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**

        - id: dealer-service
          uri: lb://dealer-service
          predicates:
            - Path=/dealer/**

        - id: farmer-service
          uri: lb://farmer-service
          predicates:
            - Path=/farmer/**

        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

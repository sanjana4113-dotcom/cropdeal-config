server.port=8087
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**,/login,/register

spring.cloud.gateway.routes[1].id=crop-service
spring.cloud.gateway.routes[1].uri=lb://crop-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/crops/**

spring.cloud.gateway.routes[2].id=dealer-service
spring.cloud.gateway.routes[2].uri=lb://dealer-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/dealers/**

spring.cloud.gateway.routes[3].id=auth-service
spring.cloud.gateway.routes[3].uri=lb://auth-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[3].id=farmer-service
spring.cloud.gateway.routes[3].uri=lb://farmer-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/farmers/**

spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[5].id=admin-service
spring.cloud.gateway.routes[5].uri=lb://admin-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/admin/**
